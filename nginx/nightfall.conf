# NightFall 博客后端反代配置（ech0 说说 + artalk 评论）
# 博客本体部署在 GitHub Pages: https://nightfall7.top（apex 域 CNAME 到 nightnight-30.github.io）
# 本服务器只负责反代后端 API，不托管静态文件
#
# 域名架构（ICP 备案通过后）:
#   nightfall7.top       → CNAME → nightnight-30.github.io  (博客前端, GitHub Pages CDN)
#   api.nightfall7.top   → A     → 47.103.65.110            (后端 API + ech0 管理后台)
#
# 端口: 443（ICP 备案通过后标准 HTTPS 端口，运营商不拦，手机 PWA 可用）
#
# 部署路径: /etc/nginx/conf.d/nightfall.conf
# SSL 证书: certbot HTTP-01 签发（ICP 通过后 80 通了，可用 HTTP-01 自动续期）
#   certbot --nginx -d api.nightfall7.top
# 证书路径: /etc/letsencrypt/live/api.nightfall7.top/
#
# 历史背景: 备案审核期曾用 8443 非标端口 + DNS-01 签证书（详见 Obsidian 操作变更记录-2026-06-29/30）

server {
    listen 443 ssl;
    server_name api.nightfall7.top;

    # SSL 证书（certbot HTTP-01 签发，自动续期）
    ssl_certificate     /etc/letsencrypt/live/api.nightfall7.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.nightfall7.top/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志
    access_log /var/log/nginx/nightfall.access.log;
    error_log  /var/log/nginx/nightfall.error.log;

    # === 安全拦截 ===
    location ~* \.php$|\.asp$|\.aspx$|\.jsp$|\.cgi$ {
        return 403;
    }
    location ~* \.(zip|rar|tar\.gz|tgz|7z|sql|bak)$ {
        return 403;
    }
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # === artalk 评论反代 ===
    # _config.stellar.yml: comments.artalk.server = https://api.nightfall7.top/artalk
    # trusted_domains 需加 https://nightfall7.top（博客前端 Origin）
    location /artalk/ {
        proxy_pass http://127.0.0.1:23366/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # === ech0 说说反代 ===
    # source/js/ech0-talks.js: ECH0_CONFIG.base = https://api.nightfall7.top/ech0
    location /ech0/ {
        proxy_pass http://127.0.0.1:6277/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 32m;
    }

    # === ech0 前端资源兜底 ===
    # ech0 管理后台假设在根路径 / 提供服务，HTML 用绝对路径引用 /assets/、/favicon.ico、/app.webmanifest 等
    # 用 location / 兜底反代到 ech0 容器（管理后台公网直连 https://api.nightfall7.top/）
    location / {
        proxy_pass http://127.0.0.1:6277/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
