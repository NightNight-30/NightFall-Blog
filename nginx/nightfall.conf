# NightFall 博客后端反代配置（ech0 说说 + artalk 评论）
# 博客本体部署在 GitHub Pages: https://NightNight-30.github.io
# 本服务器只负责反代后端 API，不托管静态文件
#
# 域名: nightfall7.top（阿里云万网购买，ICP 备案中）
# 临时端口: 8443（备案审核 1-3 周期间用，非标端口不查备案）
# 备案通过后改回 443（标准 HTTPS 端口）
#
# 部署路径: /etc/nginx/conf.d/nightfall.conf
# SSL 证书: certbot DNS-01 手动挑战签发（备案期间 80 不通，用 DNS-01 不依赖 80）
#   certbot certonly --manual --preferred-challenges dns -d nightfall7.top
# 证书路径: /etc/letsencrypt/live/nightfall7.top/

server {
    # 临时 8443 端口（备案通过后改成 443）
    listen 8443 ssl;
    server_name nightfall7.top;

    # SSL 证书（certbot DNS-01 签发）
    ssl_certificate     /etc/letsencrypt/live/nightfall7.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nightfall7.top/privkey.pem;
    ssl_protocols TLSv1.3 TLSv1.2;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 日志
    access_log /var/log/nginx/nightfall.access.log;
    error_log  /var/log/nginx/nightfall.error.log;

    # === 安全拦截 ===
    location ~* \.php$|\.asp$|\.aspx$|\.jsp$|\.cgi$ {
        return 403;
    }
    location ~* \.(zip|rar|tar\.gz|tgz|7z|sql|bak)$ {
        return 403;
    }
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }
    location ~ /\.(?!well-known).* {
        deny all;
    }

    # === artalk 评论反代 ===
    # _config.stellar.yml: comments.artalk.server = https://nightfall7.top:8443/artalk
    location /artalk/ {
        proxy_pass http://127.0.0.1:23366/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # === ech0 说说反代 ===
    # source/js/ech0-talks.js: ECH0_CONFIG.base = https://nightfall7.top:8443/ech0
    location /ech0/ {
        proxy_pass http://127.0.0.1:6277/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        client_max_body_size 32m;
    }

    # === ech0 前端资源兜底 ===
    # ech0 管理后台假设在根路径 / 提供服务，HTML 用绝对路径引用 /assets/、/favicon.ico、/app.webmanifest 等
    # 用 location / 兜底反代到 ech0 容器（不再用 location = / 302 跳博客，让根路径给 ech0 用）
    location / {
        proxy_pass http://127.0.0.1:6277/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
