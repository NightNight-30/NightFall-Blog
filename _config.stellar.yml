open_graph:
  enable: true
  twitter_id: # for open_graph meta

# 外部文件注入（https://xaoxuu.com/wiki/stellar/advanced-settings/ §外部文件注入）
# head: 注入到 <head> 末尾；script: 注入到 <body> 末尾
inject:
  head:
    - <link rel="stylesheet" href="/css/code-enhance.css?v=20260721k">
  script:
    - <script src="/js/tech-listing-banner.js" defer></script>
    - <script src="/js/swiper-fancybox-group.js" defer></script>
    - <script src="/js/sidebar-talks.js?v=20260721c" defer></script>

# SEO: Canonical 防备用站/盗站分散主站权重（https://xaoxuu.com/wiki/stellar/seo-settings/）
# originalHost 留空 → 功能完全关闭（不注入 canonical 标签、不弹任何提示）
# 部署上线时取消注释填生产域名即开启；非主站访问会弹「备用站/盗站」提示并加 noindex,nofollow
canonical:
  originalHost: nightfall7.top  # 生产主站域名（必须全小写，浏览器 host 自动小写，大写不匹配会弹盗站提示）
  officialHosts: # 备用站主机列表，主站部署后访问这些地址会显示「备用站」提示而非「盗站」警告
    - localhost

style:
  prefers_theme: auto # auto / light / dark
  smooth_scroll: true # true / false 开启时如果目录过长可能无法准确定位
  font-size:
    root: 16px # 改这个会影响全局所有文字的字号
    body: 17px # 影响正文区域的字号，如果改成 px 则不受 root 影响
    code: 85% # 相较于其所在行的文本大小，建议用百分比
    codeblock: 0.8125rem # 13px
  font-family:
    body: 'system-ui, "Microsoft Yahei", "Segoe UI", Arial, sans-serif'
    code: 'Menlo, Monaco, Consolas, system-ui, monospace, sans-serif'
    codeblock: 'Menlo, Monaco, Consolas, system-ui, monospace, sans-serif'
  text-align: left
  prefix:
    h2: https://api.iconify.design/ci:heading-h2.svg
  border-radius:
    card-l: 24px # 侧边栏、文章横幅位置的圆角
    card: 16px # 文章内大部分卡片的圆角
    card-s: 12px # 文章内小型卡片的圆角
    bar: 8px # 横条类元素的圆角
    image-l: 24px # 非技术类文章插图圆角
    image: 16px # 技术类文章插图圆角
    image-s: 8px # 评论区图片圆角（部分评论支持）
  color:
    # 主题色配置（不会根据明暗动态调整，请设置为通用的颜色）
    theme: 'hsl(192 98% 55%)' # 主题色
    accent: 'hsl(14 100% 57%)' # 强调色
    link: 'hsl(207 90% 54%)' # 超链接颜色
  animated_avatar:
    animate: auto # auto, always
    background: https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.12/avatar/round/rainbow64@3x.webp
  codeblock:
    scrollbar: 4px
    highlightjs_theme: https://gcore.jsdelivr.net/gh/highlightjs/cdn-release@11.9/build/styles/atom-one-dark.min.css
  loading:
    loading: 正在加载
    error: 加载失败，请稍后重试。
  gradient: # https://webgradients.com/
    start: 'linear-gradient(to right, hsl(215, 95%, 64%), hsl(195, 95%, 60%), hsl(165, 95%, 56%), hsl(165, 95%, 56%), hsl(195 95% 60%), hsl(215, 95%, 64%))'
  leftbar:
    # 可以设置：纯色/渐变色/图片作为背景
    background-color: var(--card) # var(--block)
    background-image: url(https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.13/image/sidebar-bg1@small.jpg)
    blur-px: 100px
    blur-bg: var(--bg-a60)
    background-opacity: 0.8
  paginator:
    prev: https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.12/arrow/f049bbd4e88ec.svg
    next: https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.12/arrow/064b95430caf4.svg
  error_page: https://gcore.jsdelivr.net/gh/cdn-x/placeholder@1.0.12/404/1c830bfcd517d.svg
  site: # 使用 background-image 后，blur 设置才有效
    background-image: url(/img/site-bg-mountains.jpg)
    blur-px: 100px
    blur-bg: var(--bg-a75)
    blur-sat: 300%
  # 技术文章内页各级标题前面的符号
  header_prefix:
    h2: '#'
    h3: '='
    h4: '|'
    h5: ':'

# 站点页面布局配置
site_tree:
  home:
    leftbar: welcome, recent
    rightbar: recent_talks
  post:
    leftbar: welcome, related, recent
    rightbar: toc
  page:
    leftbar: welcome, recent
    rightbar: toc
  # 笔记本列表页
  notebooks:
    base_dir: notebooks
    menu_id: notebooks
    leftbar: welcome, recent
    rightbar: null
  # 笔记列表页
  notes:
    menu_id: notebooks
    leftbar: welcome, tagtree, recent
    rightbar: null
  # 笔记内页
  note:
    leftbar: welcome, tagtree, recent
    rightbar: toc

# 笔记本全局配置
notebook:
  # 自动摘要长度
  auto_excerpt: 128
  # 每页显示多少条笔记，0 表示不分页
  per_page: 20
  # 笔记排序方式，默认按更新时间降序
  order_by: -updated
  # 是否在笔记页面显示许可协议
  license: false
  # 是否在笔记页面显示分享按钮
  share: false
  # 标签图标（tagtree widget 用，key 区分大小写，'' 是所有未匹配标签的默认图标）
  # 注意：必须配在这里，配在笔记本 yml 的 tagicons 字段无效（源码只读 theme.notebook.tagcons）
  tagcons:
    '': solar:hashtag-square-bold
    # tech 标签
    'Git': fab:git-alt
    'JavaScript': fab:js
    'Python': fab:python
    'Vue': fab:vuejs
    'React': fab:react
    'CSS': fab:css3-alt
    'Node.js': fab:node-js
    'Docker': fab:docker
    '前端': solar:code-bold-duotone
    '工具': solar:settings-bold-duotone
    # book 标签
    '小说': solar:notebook-bold-duotone
    '心理学': solar:heart-pulse-bold-duotone
    '经济学': solar:chart-bold-duotone
    '科技': solar:rocket-bold-duotone
    '自我成长': solar:rocket-bold-duotone

# tech: 默认技术类文章, story: 图文类文章，文字和段落间增距大
article:
  type: tech # tech/story

# 设置鼠标指上 subtitle 后翻转另一行字(导航title下的文字)
logo:
  subtitle: '岂能尽如人意 | 但求无愧我心'
  avatar: '[{config.avatar}](/about/)' # you can set avatar link in _config.yml or '[https://xxx.png](/about/)'
  title: '[{config.title}](/)' # you can set html tag like: '[<img no-lazy height="32px" src="xxx"/>](/)'


# 侧边栏主功能导航菜单
menubar:
  columns: 5 # 一行多少个
  items: # 可按照自己需求增加，符合以下格式即可
    - id: post # 页面中高亮的 menu_id
      theme: '#E91E63' # 高亮时的颜色，仅 svg 中 fill="currentColor" 时有效
      icon: solar:chat-square-like-bold-duotone # 支持 svg/img 标签，可以定义在 icons.yml 文件中，也支持外部图片的 URL
      title: 博客 # 标题
      url: / # 跳转链接，支持相对路径和绝对路径
    - id: life
      theme: '#FFC107'
      icon: solar:camera-bold-duotone
      title: 生活
      url: /life/
    - id: friends
      theme: '#6366F1'
      icon: solar:planet-bold-duotone
      title: 友链
      url: /friends/
    - id: shuoshuo
      theme: '#00BFA5'
      icon: solar:balloon-bold-duotone
      title: 说说
      url: /shuoshuo/
    - id: about
      theme: '#6D28D9'
      icon: solar:user-bold-duotone
      title: 关于
      url: /about/

# 文章搜索
search:
  service: local_search # local_search, todo...
  local_search:
    field: all # post, page, all
    path: /search.json # 搜索文件存放位置
    content: true # 是否搜索内容
    skip_search: [] # 指定 path 中的内容不被搜索。
    codeblock: true # 是否搜索代码块（需要content: true)

# 评论
comments:
  service: artalk
  comment_title: 快来参与讨论吧~
  lazyload: false
  artalk:
    css: https://cdn.jsdelivr.net/npm/artalk@2.9/dist/Artalk.css
    js: https://cdn.jsdelivr.net/npm/artalk@2.9/dist/Artalk.js
    server: https://api.nightfall7.top/artalk
    site: 'NightFall'
    darkMode: auto
    fancybox: true

# 页脚
footer:
  social:
    github:
      icon: '<img src="https://gcore.jsdelivr.net/gh/cdn-x/placeholder/social/08a41b181ce68.svg"/>'
      url: https://github.com/NightNight-30
    music:
      icon: '<img src="https://gcore.jsdelivr.net/gh/cdn-x/placeholder/social/3845874.svg"/>'
      url: https://music.163.com/#/user/home?id=91356672
    # TODO: 配置留言板后取消注释（填入站内路径如 /comments/ 或外部链接）
    # comments:
    #   icon: '<img src="https://gcore.jsdelivr.net/gh/cdn-x/placeholder/social/942ebbf1a4b91.svg"/>'
    #   url: /comments/
  # 底部站点地图：两组导航链接，提升导航 + SEO
  sitemap:
    - title: 博客
      items:
        - '[近期发布](/)'
        - '[标签](/tags/)'
        - '[归档](/archives/)'
    - title: 导航
      items:
        - '[生活](/life/)'
        - '[友链](/friends/)'
        - '[说说](/shuoshuo/)'
        - '[关于](/about/)'
  # 页脚文字：每行配 iconify 小图标，让信息更生动
  # 用 HTML <a> 而非 Markdown 链接：因为整段是 <div> HTML 块，CommonMark 不会处理块内的 Markdown
  content: |
    <div class="footer-info">
      <div class="footer-row">
        <img class="footer-ico" src="https://api.iconify.design/solar:user-bold-duotone.svg?color=%23999" alt=""/>
        <span>本站由 <a href="/">NightFall</a> 使用 <a href="https://github.com/xaoxuu/hexo-theme-stellar/tree/1.33.1">Stellar 1.33.1</a> 主题创建</span>
      </div>
      <div class="footer-row">
        <img class="footer-ico" src="https://api.iconify.design/solar:shield-check-bold-duotone.svg?color=%23999" alt=""/>
        <span>本博客所有文章除特别声明外，均采用 <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a> 许可协议，转载请注明出处</span>
      </div>
      <div class="footer-row footer-beian">
        <span class="beian-item">
          <img class="footer-ico" src="https://api.iconify.design/solar:server-bold-duotone.svg?color=%23999" alt=""/>
          <a href="https://beian.miit.gov.cn/" target="_blank" rel="noopener">沪ICP备2026031983号-1</a>
        </span>
        <span class="beian-sep">·</span>
        <span class="beian-item">
          <img class="footer-ico beian-police" src="/img/beian-police.png" alt="公安"/>
          <a href="http://www.beian.mps.gov.cn/" target="_blank" rel="noopener">沪公网安备31011302009443号</a>
        </span>
        <span class="beian-sep">·</span>
        <span class="beian-item">
          <img class="footer-ico beian-moe" src="/img/beian-moe.svg" alt="萌"/>
          <a href="https://icp.gov.moe/?keyword=20260810" target="_blank" rel="noopener">萌ICP备20260810号</a>
        </span>
      </div>
      <div class="footer-row">
        <img class="footer-ico" src="https://api.iconify.design/solar:clock-circle-bold-duotone.svg?color=%23999" alt=""/>
        <span>本站已运行 <span id="uptime-counter">加载中...</span></span>
      </div>
      <div class="footer-row">
        <img class="footer-ico" src="https://api.iconify.design/solar:eye-bold-duotone.svg?color=%23999" alt=""/>
        <span id="busuanzi_container_site_pv">本站总访问量 <span id="busuanzi_value_site_pv">0</span> 次</span>
      </div>
    </div>
    <script async src="//busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
    <script src="/js/footer-uptime.js" defer></script>

# 插件配置覆盖（与 stellar 主题默认 plugins 深合并）
plugins:
  fancybox:
    # 在默认的 .timenode p>img 基础上追加 swiper 轮播图片，让相册图片也能点击放大
    selector: .timenode p>img, .tag-plugin.swiper .swiper-slide img


